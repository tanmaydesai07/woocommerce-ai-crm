<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - CRM WooCommerce</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
  <div class="bg-white p-8 rounded-lg shadow-md w-96">
    <h1 class="text-2xl font-bold text-center mb-2">CRM System</h1>
    <p class="text-gray-500 text-center mb-6">WooCommerce Integration</p>
    <form id="loginForm">
      <input type="text" id="username" placeholder="Username" class="w-full p-3 mb-3 border rounded" required>
      <input type="password" id="password" placeholder="Password" class="w-full p-3 mb-3 border rounded" required>
      <button type="submit" class="w-full bg-blue-500 text-white p-3 rounded hover:bg-blue-600">Login</button>
    </form>
    <p id="error" class="text-red-500 text-center mt-3"></p>
    <p class="text-center mt-4">Don't have an account? <a href="signup.html" class="text-blue-500">Sign Up</a></p>
    <div class="mt-4 p-3 bg-gray-50 rounded text-sm text-gray-600">
      <p>Admin: admin / admin123</p>
    </div>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        await axios.post('/api/login', {
          username: document.getElementById('username').value,
          password: document.getElementById('password').value
        });
        window.location.href = '/dashboard.html';
      } catch (err) {
        document.getElementById('error').textContent = 'Invalid credentials';
      }
    });
  </script>
</body>
</html>
